<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solo Player</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(180deg, #0a0a12 0%, #12121f 50%, #0a0a12 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Rajdhani', sans-serif;
            color: #fff;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 400px;
            background: linear-gradient(180deg, rgba(20, 20, 35, 0.95) 0%, rgba(10, 10, 20, 0.98) 100%);
            border: 1px solid rgba(100, 80, 180, 0.3);
            border-radius: 4px;
            padding: 30px 25px;
            position: relative;
            box-shadow:
                0 0 40px rgba(100, 80, 180, 0.15),
                inset 0 0 60px rgba(100, 80, 180, 0.05);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border: 1px solid rgba(100, 80, 180, 0.2);
            border-radius: 4px;
            pointer-events: none;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 30px;
            height: 30px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            font-size: 24px;
            cursor: pointer;
            transition: color 0.3s;
        }

        .close-btn:hover {
            color: #fff;
        }

        /* Header Section */
        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header-decoration {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .header-line {
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #6b5bd2, transparent);
        }

        .diamond {
            width: 12px;
            height: 12px;
            background: #5ecece;
            transform: rotate(45deg);
            box-shadow: 0 0 10px #5ecece;
        }

        .title {
            font-family: 'Orbitron', monospace;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 4px;
            background: linear-gradient(180deg, #fff 0%, #5ecece 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(94, 206, 206, 0.5);
        }

        .header-bottom {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        .diamond-small {
            width: 8px;
            height: 8px;
            background: #5ecece;
            transform: rotate(45deg);
            box-shadow: 0 0 8px #5ecece;
        }

        /* Rank Badge */
        .rank-badge {
            display: inline-block;
            padding: 8px 30px;
            border: 1px solid #5ecece;
            border-radius: 20px;
            font-family: 'Orbitron', monospace;
            font-size: 14px;
            letter-spacing: 3px;
            color: #5ecece;
            margin: 15px 0;
            text-shadow: 0 0 10px rgba(94, 206, 206, 0.5);
        }

        /* Level Section */
        .level-section {
            text-align: center;
            margin-bottom: 25px;
        }

        .level-label {
            font-size: 14px;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 5px;
        }

        .level-number {
            font-family: 'Orbitron', monospace;
            font-size: 48px;
            font-weight: 900;
            color: #6b5bd2;
            text-shadow: 0 0 20px rgba(107, 91, 210, 0.5);
        }

        /* Attributes Section */
        .attributes-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .attributes-title {
            font-family: 'Orbitron', monospace;
            font-size: 16px;
            letter-spacing: 2px;
            color: #fff;
        }

        .attributes-max {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 4px;
        }

        .add-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #6b5bd2;
            background: transparent;
            color: #6b5bd2;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .add-btn:hover {
            background: rgba(107, 91, 210, 0.2);
            box-shadow: 0 0 15px rgba(107, 91, 210, 0.5);
        }

        /* Radar Chart */
        .radar-container {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 0 auto 30px;
        }

        .radar-chart {
            width: 100%;
            height: 100%;
        }

        .stat-label {
            position: absolute;
            text-align: center;
            font-family: 'Orbitron', monospace;
            font-size: 11px;
            letter-spacing: 1px;
        }

        .stat-label .name {
            color: rgba(255, 255, 255, 0.8);
        }

        .stat-label .value {
            color: #5ecece;
            font-size: 16px;
            font-weight: 700;
        }

        .stat-strength { top: -5px; left: 50%; transform: translateX(-50%); }
        .stat-intelligence { top: 22%; right: -10px; }
        .stat-agility { bottom: 22%; right: -10px; }
        .stat-perception { bottom: -5px; left: 50%; transform: translateX(-50%); }
        .stat-endurance { bottom: 22%; left: -10px; }
        .stat-focus { top: 22%; left: -10px; }

        /* XP Section */
        .xp-section {
            margin-bottom: 20px;
        }

        .xp-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .xp-label {
            font-family: 'Orbitron', monospace;
            font-size: 12px;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.6);
        }

        .xp-percent {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }

        .xp-value {
            font-family: 'Orbitron', monospace;
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            text-align: center;
            margin-bottom: 15px;
        }

        .xp-bar {
            height: 8px;
            background: rgba(50, 50, 80, 0.5);
            border-radius: 4px;
            overflow: hidden;
        }

        .xp-fill {
            height: 100%;
            width: 35%;
            background: linear-gradient(90deg, #3a7bd5, #5ecece);
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(94, 206, 206, 0.5);
        }

        /* Next Rank */
        .next-rank {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid rgba(100, 80, 180, 0.2);
        }

        .next-rank-label {
            font-family: 'Orbitron', monospace;
            font-size: 12px;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.5);
        }

        .next-rank-value {
            font-family: 'Orbitron', monospace;
            font-size: 18px;
            letter-spacing: 2px;
            color: #6b5bd2;
            text-shadow: 0 0 10px rgba(107, 91, 210, 0.5);
        }

        .rank-progress {
            width: 100%;
            margin-top: 10px;
        }

        .rank-bar {
            height: 4px;
            background: rgba(50, 50, 80, 0.5);
            border-radius: 2px;
            position: relative;
        }

        .rank-dot {
            position: absolute;
            left: 5%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 10px;
            background: #3a7bd5;
            border-radius: 50%;
            box-shadow: 0 0 10px #3a7bd5;
        }

        .level-needed {
            text-align: center;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 8px;
        }

        /* Settings Button */
        .settings-btn {
            position: absolute;
            bottom: 15px;
            right: 15px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(50, 50, 80, 0.5);
            border: 1px solid rgba(100, 80, 180, 0.3);
            color: rgba(255, 255, 255, 0.6);
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .settings-btn:hover {
            background: rgba(107, 91, 210, 0.3);
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="card">
        <button class="close-btn">&times;</button>

        <!-- Header -->
        <div class="header">
            <div class="header-decoration">
                <div class="header-line"></div>
                <div class="diamond"></div>
                <div class="header-line"></div>
            </div>
            <h1 class="title">SOLO PLAYER</h1>
            <div class="header-bottom">
                <div class="header-line"></div>
                <div class="diamond-small"></div>
                <div class="header-line"></div>
            </div>
        </div>

        <!-- Rank Badge -->
        <div style="text-align: center;">
            <span class="rank-badge">E-RANK</span>
        </div>

        <!-- Level -->
        <div class="level-section">
            <div class="level-label">LEVEL</div>
            <div class="level-number">2</div>
        </div>

        <!-- Attributes -->
        <div class="attributes-header">
            <div>
                <div class="attributes-title">ATTRIBUTES</div>
                <div class="attributes-max">MAX: 115 (Level 2)</div>
            </div>
            <button class="add-btn">+</button>
        </div>

        <!-- Radar Chart -->
        <div class="radar-container">
            <svg class="radar-chart" viewBox="0 0 200 200">
                <!-- Hexagon Grid Lines -->
                <g fill="none" stroke="rgba(100, 80, 180, 0.2)" stroke-width="1">
                    <!-- Outer hexagon -->
                    <polygon points="100,15 170,57.5 170,142.5 100,185 30,142.5 30,57.5"/>
                    <!-- Middle hexagons -->
                    <polygon points="100,35 150,67.5 150,132.5 100,165 50,132.5 50,67.5"/>
                    <polygon points="100,55 130,77.5 130,122.5 100,145 70,122.5 70,77.5"/>
                    <polygon points="100,75 115,87.5 115,112.5 100,125 85,112.5 85,87.5"/>
                    <!-- Lines from center -->
                    <line x1="100" y1="100" x2="100" y2="15"/>
                    <line x1="100" y1="100" x2="170" y2="57.5"/>
                    <line x1="100" y1="100" x2="170" y2="142.5"/>
                    <line x1="100" y1="100" x2="100" y2="185"/>
                    <line x1="100" y1="100" x2="30" y2="142.5"/>
                    <line x1="100" y1="100" x2="30" y2="57.5"/>
                </g>

                <!-- Data polygon -->
                <polygon
                    points="100,25 120,82 125,115 100,145 55,115 60,82"
                    fill="rgba(107, 91, 210, 0.3)"
                    stroke="#6b5bd2"
                    stroke-width="2"
                />

                <!-- Data points -->
                <g fill="#6b5bd2">
                    <circle cx="100" cy="25" r="4"/>
                    <circle cx="120" cy="82" r="4"/>
                    <circle cx="125" cy="115" r="4"/>
                    <circle cx="100" cy="145" r="4"/>
                    <circle cx="55" cy="115" r="4"/>
                    <circle cx="60" cy="82" r="4"/>
                </g>
            </svg>

            <!-- Stat Labels -->
            <div class="stat-label stat-strength">
                <div class="name">STRENGTH</div>
                <div class="value">88</div>
            </div>
            <div class="stat-label stat-intelligence">
                <div class="name">INTELLIGENCE</div>
                <div class="value">30</div>
            </div>
            <div class="stat-label stat-agility">
                <div class="name">AGILITY</div>
                <div class="value">40</div>
            </div>
            <div class="stat-label stat-perception">
                <div class="name">PERCEPTION</div>
                <div class="value">10</div>
            </div>
            <div class="stat-label stat-endurance">
                <div class="name">ENDURANCE</div>
                <div class="value">10</div>
            </div>
            <div class="stat-label stat-focus">
                <div class="name">FOCUS</div>
                <div class="value">10</div>
            </div>
        </div>

        <!-- XP Section -->
        <div class="xp-section">
            <div class="xp-header">
                <span class="xp-label">EXPERIENCE POINTS</span>
                <span class="xp-percent">35%</span>
            </div>
            <div class="xp-value">1,350</div>
            <div class="xp-bar">
                <div class="xp-fill"></div>
            </div>
        </div>

        <!-- Next Rank -->
        <div class="next-rank">
            <span class="next-rank-label">NEXT RANK</span>
            <span class="next-rank-value">D-RANK</span>
        </div>
        <div class="rank-progress">
            <div class="rank-bar">
                <div class="rank-dot"></div>
            </div>
            <div class="level-needed">Level 20 needed</div>
        </div>

        <button class="settings-btn">⚙</button>
    </div>
</body>
</html>
